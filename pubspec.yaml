name: mastercota
description: Plateforme de cotisations communautaires pour l'Afrique francophone.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^14.2.0

  # Backend
  supabase_flutter: ^2.5.4

  # UI & Design
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  percent_indicator: ^4.2.3
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  gap: ^3.0.1

  # Forms
  pinput: ^5.0.0

  # Media
  image_picker: ^1.1.2

  # Sharing
  share_plus: ^9.0.0
  url_launcher: ^6.3.0

  # Utils
  intl: ^0.19.0
  uuid: ^4.4.0
  shared_preferences: ^2.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/

flutter_launcher_icons:
  android: false
  ios: true
  image_path: 'assets/images/app_icon.png'
  min_sdk_android: 21
